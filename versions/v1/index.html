<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>v1 — Basic Drive</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 6px;
      line-height: 1.8;
      pointer-events: none;
    }
    #hud .label { color: #888; }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">SPEED  </span><span id="spd">0</span> km/h</div>
    <div><span class="label">CONTROLS  </span>WASD / Arrow Keys</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Renderer ──────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    // ── Scene ─────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 40, 120);

    // ── Camera ────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 300);
    resize();

    // ── Lights ────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
    sun.position.set(30, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 200;
    sun.shadow.camera.left = -60;
    sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60;
    sun.shadow.camera.bottom = -60;
    scene.add(sun);

    // ── Ground ────────────────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c40 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid overlay
    const gridHelper = new THREE.GridHelper(200, 40, 0x3a6330, 0x3a6330);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // ── Car ───────────────────────────────────────────────────
    const carGroup = new THREE.Group();
    scene.add(carGroup);

    // Body
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc2200 });
    const bodyGeo = new THREE.BoxGeometry(1.8, 0.55, 4.0);
    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    bodyMesh.position.y = 0.55;
    bodyMesh.castShadow = true;
    carGroup.add(bodyMesh);

    // Cabin
    const cabinMat = new THREE.MeshLambertMaterial({ color: 0xee3311 });
    const cabinGeo = new THREE.BoxGeometry(1.4, 0.45, 2.0);
    const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
    cabinMesh.position.set(0, 1.02, -0.2);
    cabinMesh.castShadow = true;
    carGroup.add(cabinMesh);

    // Windows
    const winMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 });
    [
      { pos: [0, 1.02, 0.81], rot: [0, 0, 0], w: 1.35, h: 0.35 },   // front
      { pos: [0, 1.02, -1.21], rot: [0, 0, 0], w: 1.35, h: 0.35 },  // rear
      { pos: [0.71, 1.02, -0.2], rot: [0, Math.PI/2, 0], w: 1.8, h: 0.33 }, // right
      { pos: [-0.71, 1.02, -0.2], rot: [0, Math.PI/2, 0], w: 1.8, h: 0.33 },// left
    ].forEach(({ pos, rot, w, h }) => {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), winMat);
      m.position.set(...pos);
      m.rotation.set(...rot);
      carGroup.add(m);
    });

    // Wheels
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const rimMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
    const wheelPositions = [
      [-1.0, 0.32, 1.35],
      [ 1.0, 0.32, 1.35],
      [-1.0, 0.32, -1.35],
      [ 1.0, 0.32, -1.35],
    ];
    const wheels = [];
    wheelPositions.forEach(pos => {
      const g = new THREE.Group();
      const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.32, 0.25, 16),
        wheelMat
      );
      tire.rotation.z = Math.PI / 2;
      tire.castShadow = true;
      g.add(tire);
      const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.26, 8),
        rimMat
      );
      rim.rotation.z = Math.PI / 2;
      g.add(rim);
      g.position.set(...pos);
      carGroup.add(g);
      wheels.push(g);
    });

    // Headlights
    const lightMat = new THREE.MeshLambertMaterial({ color: 0xffffcc, emissive: 0xffff88 });
    [-0.55, 0.55].forEach(x => {
      const l = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.05), lightMat);
      l.position.set(x, 0.6, 2.03);
      carGroup.add(l);
    });

    // ── Scenery: trees ────────────────────────────────────────
    function addTree(x, z) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.2, 1.2, 6),
        new THREE.MeshLambertMaterial({ color: 0x8B5E3C })
      );
      trunk.position.set(x, 0.6, z);
      trunk.castShadow = true;
      scene.add(trunk);

      const foliage = new THREE.Mesh(
        new THREE.ConeGeometry(1.0, 2.5, 7),
        new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
      );
      foliage.position.set(x, 2.5, z);
      foliage.castShadow = true;
      scene.add(foliage);
    }

    const rng = mulberry32(42);
    for (let i = 0; i < 60; i++) {
      const angle = rng() * Math.PI * 2;
      const dist = 15 + rng() * 70;
      addTree(Math.cos(angle) * dist, Math.sin(angle) * dist);
    }

    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // ── Input ─────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup',   e => { keys[e.code] = false; });

    // ── Physics state ─────────────────────────────────────────
    let speed = 0;       // forward speed (units/s)
    let angle = 0;       // car yaw (radians)

    const MAX_SPEED   = 20;
    const ACCEL       = 10;
    const BRAKE_FORCE = 18;
    const FRICTION    = 5;
    const TURN_SPEED  = 1.6; // rad/s at full speed

    // Camera state
    const camOffset   = new THREE.Vector3(0, 4, -10);
    const camLookAt   = new THREE.Vector3();
    const smoothCamPos = new THREE.Vector3(0, 4, -10);

    const clock = new THREE.Clock();
    const spdEl = document.getElementById('spd');

    // ── Loop ──────────────────────────────────────────────────
    function update(dt) {
      const fwd = keys['KeyW'] || keys['ArrowUp'];
      const back = keys['KeyS'] || keys['ArrowDown'];
      const left = keys['KeyA'] || keys['ArrowLeft'];
      const right = keys['KeyD'] || keys['ArrowRight'];

      // Acceleration / braking
      if (fwd)  speed = Math.min(speed + ACCEL * dt, MAX_SPEED);
      else if (back) speed = Math.max(speed - BRAKE_FORCE * dt, -MAX_SPEED * 0.5);
      else {
        const friction = FRICTION * dt;
        if (Math.abs(speed) < friction) speed = 0;
        else speed -= Math.sign(speed) * friction;
      }

      // Steering (only when moving)
      const turnAmount = TURN_SPEED * dt * (speed / MAX_SPEED);
      if (left)  angle += turnAmount;
      if (right) angle -= turnAmount;

      // Move car
      carGroup.position.x += Math.sin(angle) * speed * dt;
      carGroup.position.z += Math.cos(angle) * speed * dt;
      carGroup.rotation.y = angle;

      // Spin wheels
      const wheelSpin = speed * dt / 0.32;
      wheels.forEach(w => { w.rotation.x += wheelSpin; });

      // Camera follow
      const desiredCamPos = new THREE.Vector3(
        carGroup.position.x - Math.sin(angle) * 10,
        carGroup.position.y + 4,
        carGroup.position.z - Math.cos(angle) * 10
      );
      smoothCamPos.lerp(desiredCamPos, 6 * dt);
      camera.position.copy(smoothCamPos);
      camLookAt.set(
        carGroup.position.x + Math.sin(angle) * 3,
        carGroup.position.y + 1,
        carGroup.position.z + Math.cos(angle) * 3
      );
      camera.lookAt(camLookAt);

      // HUD
      spdEl.textContent = Math.abs(speed * 3.6).toFixed(0);
    }

    function loop() {
      requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
    }
    loop();
  </script>
</body>
</html>
