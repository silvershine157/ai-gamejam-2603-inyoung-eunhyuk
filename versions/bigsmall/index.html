<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bigsmall — Size Gimmick POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* ── Game HUD ─────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 12px; left: 12px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.55);
      padding: 10px 16px;
      border-radius: 8px;
      line-height: 2;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 224px;
    }
    #hud .label { color: #777; }
    #hud .val   { color: #7eb8f7; font-weight: bold; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-bg  { flex: 1; height: 6px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.1s, background 0.1s; }

    /* ── Ammo display ─────────────────────────────────────── */
    #ammo-row {
      display: flex; align-items: center; gap: 6px;
      line-height: 1;
    }
    #ammo-bullets { display: flex; gap: 4px; }
    .bullet {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ffdd44;
      box-shadow: 0 0 5px #ffaa00;
      transition: background 0.1s, box-shadow 0.1s;
    }
    .bullet.empty {
      background: rgba(255,255,255,0.12);
      box-shadow: none;
    }
    #ammo-charge-bg {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    #ammo-charge-fill {
      height: 100%; border-radius: 2px;
      background: #ffdd44;
      width: 0%;
      transition: width 0.05s;
    }

    /* ── Size label ───────────────────────────────────────── */
    #size-indicator {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      pointer-events: none;
    }
    #size-indicator .size-val {
      font-size: 26px; font-weight: bold;
      display: block; letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    /* ── Lap message ──────────────────────────────────────── */
    #msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace; font-size: 22px; font-weight: bold;
      color: #fff; background: rgba(0,0,0,0.65);
      padding: 16px 32px; border-radius: 10px;
      text-align: center; pointer-events: none; display: none;
    }

    /* ── Control panel toggle button ─────────────────────── */
    #panel-toggle {
      position: absolute; top: 12px; right: 12px;
      font-family: monospace; font-size: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      color: #aaa; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; user-select: none;
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }
    #panel-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

    /* ── Control panel ────────────────────────────────────── */
    #panel {
      position: absolute; top: 44px; right: 12px;
      width: 280px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      background: rgba(10,10,16,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-family: monospace; font-size: 11px; color: #ccc;
      padding: 0 0 8px 0;
      z-index: 9;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    #panel.hidden { display: none; }

    .panel-section {
      padding: 8px 14px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .panel-section:last-child { border-bottom: none; }
    .panel-section-title {
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #555;
      margin-bottom: 6px;
    }

    .param-row {
      display: grid;
      grid-template-columns: 108px 1fr 40px 46px;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .pdiff {
      font-size: 10px; font-weight: bold;
      text-align: right; white-space: nowrap;
      min-width: 46px;
    }
    .param-row label { color: #888; font-size: 11px; white-space: nowrap; }
    .param-row input[type=range] {
      width: 100%; height: 4px; appearance: none;
      background: rgba(255,255,255,0.12); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .param-row input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #7eb8f7; cursor: pointer;
    }
    .param-row .pval {
      color: #7eb8f7; font-weight: bold; text-align: right;
      font-size: 11px;
    }

    .curve-header {
      display: grid;
      grid-template-columns: 108px 1fr 40px;
      gap: 6px; margin-bottom: 2px;
    }
    .curve-header span { font-size: 9px; color: #444; text-align: center; }
    .curve-header span:last-child { text-align: right; }

    .panel-footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; gap: 6px;
    }
    .panel-btn {
      flex: 1; padding: 6px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; color: #888;
      font-family: monospace; font-size: 11px;
      cursor: pointer; text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .panel-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .panel-btn.accent { border-color: rgba(100,180,255,0.3); color: #7eb8f7; }
    .panel-btn.accent:hover { background: rgba(100,180,255,0.1); color: #aad4ff; }
  </style>
</head>
<body>

  <!-- Game HUD -->
  <div id="hud">
    <div><span class="label">SPEED  </span><span class="val" id="spd">0</span> <span class="label">km/h</span></div>
    <div><span class="label">LAPS   </span><span class="val" id="laps">0</span></div>
    <div><span class="label">BEST   </span><span class="val" id="best">--:--</span></div>
    <hr style="border-color:rgba(255,255,255,0.1);margin:4px 0">
    <div class="bar-row">
      <span class="label" style="width:42px">SIZE</span>
      <div class="bar-bg"><div class="bar-fill" id="bar-size" style="width: 2%; background: rgb(0, 55, 255);"></div></div>
      <span class="val" id="val-size">0.40×</span>
    </div>
    <div class="bar-row">
      <span class="label" style="width:42px">HP</span>
      <div class="bar-bg"><div class="bar-fill" id="bar-hp" style="width: 10.64%; background: rgb(68, 204, 255);"></div></div>
      <span class="val" id="val-hp">28</span>
    </div>
    <div class="bar-row">
      <span class="label" style="width:42px">ATK</span>
      <div class="bar-bg"><div class="bar-fill" id="bar-atk" style="width: 7.6%; background: rgb(255, 153, 68);"></div></div>
      <span class="val" id="val-atk">20</span>
    </div>
    <div class="bar-row">
      <span class="label" style="width:42px">TURN</span>
      <div class="bar-bg"><div class="bar-fill" id="bar-turn" style="width: 50%; background: rgb(204, 136, 255);"></div></div>
      <span class="val" id="val-turn">132</span>
    </div>
    <div><span class="label">SCORE  </span><span class="val" id="score">0</span><span class="label" id="score-total"> / 19</span></div>
    <div id="ammo-row">
      <span class="label" style="width:42px;flex-shrink:0">AMMO</span>
      <div id="ammo-bullets"><span class="bullet" style="display: block;"></span><span class="bullet" style="display: block;"></span><span class="bullet" style="display: block;"></span><span class="bullet" style="display: block;"></span><span class="bullet" style="display: block;"></span><span class="bullet empty" style="display: none;"></span><span class="bullet empty" style="display: none;"></span><span class="bullet empty" style="display: none;"></span><span class="bullet empty" style="display: none;"></span><span class="bullet empty" style="display: none;"></span></div>
      <div id="ammo-charge-bg"><div id="ammo-charge-fill" style="width: 0%;"></div></div>
    </div>
    <hr style="border-color:rgba(255,255,255,0.1);margin:4px 0">
    <div><span class="label">X/Z   </span>grow / shrink</div>
    <div><span class="label">WASD  </span>drive</div>
    <div><span class="label">SPACE </span>fire</div>
    <div><span class="label">Tab   </span>params</div>
  </div>

  <div id="size-indicator">
    <span class="size-val" id="size-label" style="color: rgb(0, 55, 255); text-shadow: rgb(0, 55, 255) 0px 0px 16px;">TINY</span>
  </div>

  <div id="msg"></div>

  <!-- Panel toggle button -->
  <button id="panel-toggle">⚙ Params</button>

  <!-- Control panel (built by JS) -->
  <div id="panel" class="hidden"></div>

  <!-- params.js sets window.MORPH_PARAMS — works with file:// and http:// -->
  <script src="params.js"></script>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.163.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Tunable parameters ────────────────────────────────────
    const DEFAULTS = {
      sizeRate      : 1.50,
      sizeMin       : 0.40,
      sizeMax       : 2.5,
      sizeLerp      : 8.0,
      baseMaxSpeed  : 28,
      baseAccel     : 14.0,
      baseBrake     : 22.0,
      baseFriction  : 6.0,
      baseTurnRate  : 1.8,
      speedTiny     : 1.50,
      speedGiant    : 0.70,
      accelTiny     : 1.50,
      accelGiant    : 0.60,
      turnTiny      : 2.50,
      turnGiant     : 0.40,
      hpTiny        : 0.30,
      hpGiant       : 3.0,
      atkTiny       : 0.20,
      atkGiant      : 3.0,
      projSpeed     : 50,
      projRadius    : 0.22,
      projLifetime  : 5.0,
      ammoMax       : 5,
      ammoRecharge  : 1.0,
    };

    // Live params object — starts from DEFAULTS, overwritten by params.js if loaded
    const P = { ...DEFAULTS };
    if (window.MORPH_PARAMS) {
      Object.keys(DEFAULTS).forEach(k => {
        if (window.MORPH_PARAMS[k] !== undefined) P[k] = parseFloat(window.MORPH_PARAMS[k]);
      });
    }

    // ── Control panel builder ─────────────────────────────────
    const panelEl  = document.getElementById('panel');
    const toggleEl = document.getElementById('panel-toggle');

    // Schema: [ label, key, min, max, step, display? ]
    const PANEL_SCHEMA = [
      {
        title: 'Size System',
        rows: [
          ['Size Rate',    'sizeRate',  0.2,  5.0,  0.05],
          ['Size Min',     'sizeMin',   0.1,  1.0,  0.05],
          ['Size Max',     'sizeMax',   1.0,  4.0,  0.1 ],
          ['Visual Lerp',  'sizeLerp',  1,    20,   0.5 ],
        ]
      },
      {
        title: 'Driving Base (at 1×)',
        rows: [
          ['Max Speed',    'baseMaxSpeed',  5,   60,  1  ],
          ['Acceleration', 'baseAccel',     2,   30,  0.5],
          ['Braking',      'baseBrake',     5,   50,  0.5],
          ['Friction',     'baseFriction',  1,   20,  0.5],
          ['Turn Rate',    'baseTurnRate',  0.2,  4,  0.1],
        ]
      },
      {
        title: 'Curves — Speed',
        rows: [
          ['Tiny mult',  'speedTiny',  0.1, 4.0, 0.05],
          ['Giant mult', 'speedGiant', 0.1, 4.0, 0.05],
        ]
      },
      {
        title: 'Curves — Acceleration',
        rows: [
          ['Tiny mult',  'accelTiny',  0.1, 4.0, 0.05],
          ['Giant mult', 'accelGiant', 0.1, 4.0, 0.05],
        ]
      },
      {
        title: 'Curves — Turn',
        rows: [
          ['Tiny mult',  'turnTiny',  0.1, 5.0, 0.05],
          ['Giant mult', 'turnGiant', 0.1, 5.0, 0.05],
        ]
      },
      {
        title: 'Curves — HP',
        rows: [
          ['Tiny mult',  'hpTiny',  0.05, 2.0, 0.05],
          ['Giant mult', 'hpGiant', 0.5,  5.0, 0.1 ],
        ]
      },
      {
        title: 'Curves — ATK',
        rows: [
          ['Tiny mult',  'atkTiny',  0.05, 2.0, 0.05],
          ['Giant mult', 'atkGiant', 0.5,  5.0, 0.1 ],
        ]
      },
      {
        title: 'Cannon',
        rows: [
          ['Proj Speed',    'projSpeed',    10, 120, 1   ],
          ['Proj Radius',   'projRadius',   0.05, 1.0, 0.01],
          ['Proj Lifetime', 'projLifetime',  1,  12, 0.5 ],
          ['Ammo Max',      'ammoMax',       1,  10, 1   ],
          ['Recharge (s)',  'ammoRecharge',  0.5, 10, 0.5],
        ]
      },
    ];

    function formatVal(v, step) {
      if (step >= 1) return v.toFixed(0);
      if (step >= 0.1) return v.toFixed(1);
      return v.toFixed(2);
    }

    // userDefaults: mirrors whatever was in params.json at load time
    // Used by "Restore Default" and diff markers as the baseline
    const userDefaults = { ...P };

    // Build sliders
    const sliderMap = {};  // key → { input, valEl, diffEl }

    PANEL_SCHEMA.forEach(section => {
      const sec = document.createElement('div');
      sec.className = 'panel-section';

      const title = document.createElement('div');
      title.className = 'panel-section-title';
      title.textContent = section.title;
      sec.appendChild(title);

      section.rows.forEach(([label, key, min, max, step]) => {
        const row = document.createElement('div');
        row.className = 'param-row';

        const lbl = document.createElement('label');
        lbl.textContent = label;

        const input = document.createElement('input');
        input.type = 'range';
        input.min  = min; input.max = max; input.step = step;
        input.value = P[key];

        const valEl = document.createElement('span');
        valEl.className = 'pval';
        valEl.textContent = formatVal(P[key], step);

        const diffEl = document.createElement('span');
        diffEl.className = 'pdiff';

        input.addEventListener('input', () => {
          P[key] = parseFloat(input.value);
          valEl.textContent = formatVal(P[key], step);
          updateDiff(key, step);
        });

        row.appendChild(lbl);
        row.appendChild(input);
        row.appendChild(valEl);
        row.appendChild(diffEl);
        sec.appendChild(row);

        sliderMap[key] = { input, valEl, diffEl };
      });

      panelEl.appendChild(sec);
    });

    function updateDiff(key, step) {
      const { diffEl } = sliderMap[key];
      const cur = P[key];
      const def = userDefaults[key];
      const eps = parseFloat(sliderMap[key].input.step) * 0.5;
      if (Math.abs(cur - def) < eps) {
        diffEl.textContent = '';
      } else {
        const up  = cur > def;
        const abs = Math.abs(cur - def);
        // Show absolute delta for small ranges, percent for large
        const range = parseFloat(sliderMap[key].input.max) - parseFloat(sliderMap[key].input.min);
        const label = range > 5
          ? (up ? '▲' : '▼') + Math.abs((cur - def) / def * 100).toFixed(0) + '%'
          : (up ? '▲' : '▼') + formatVal(abs, parseFloat(sliderMap[key].input.step));
        diffEl.textContent = label;
        diffEl.style.color = up ? '#ffaa44' : '#44ccff';
      }
    }

    function refreshDiffMarkers() {
      Object.keys(sliderMap).forEach(key => {
        updateDiff(key, parseFloat(sliderMap[key].input.step));
      });
    }

    function applyParams(src) {
      Object.keys(DEFAULTS).forEach(key => {
        if (src[key] !== undefined) {
          const val = parseFloat(src[key]);
          if (!isNaN(val)) {
            P[key] = val;
            if (sliderMap[key]) {
              const step = parseFloat(sliderMap[key].input.step);
              sliderMap[key].input.value = val;
              sliderMap[key].valEl.textContent = formatVal(val, step);
            }
          }
        }
      });
      refreshDiffMarkers();
    }

    // ── Footer ────────────────────────────────────────────────
    const footer = document.createElement('div');
    footer.className = 'panel-footer';

    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'panel-btn';
    restoreBtn.textContent = 'Restore Default';
    restoreBtn.addEventListener('click', () => {
      applyParams(userDefaults);
    });

    const saveBtn = document.createElement('button');
    saveBtn.className = 'panel-btn accent';
    saveBtn.textContent = 'Save params.js';
    saveBtn.addEventListener('click', () => {
      const content = 'window.MORPH_PARAMS = ' + JSON.stringify(P, null, 2) + ';\n';
      const blob = new Blob([content], { type: 'text/javascript' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'params.js';
      a.click();
      URL.revokeObjectURL(a.href);

      // Reset diff markers — saved state is now the new baseline
      Object.assign(userDefaults, P);
      refreshDiffMarkers();
    });

    footer.appendChild(restoreBtn);
    footer.appendChild(saveBtn);
    panelEl.appendChild(footer);

    // Toggle
    let panelOpen = false;
    function setPanel(open) {
      panelOpen = open;
      panelEl.classList.toggle('hidden', !open);
      toggleEl.textContent = open ? '✕ Params' : '⚙ Params';
    }
    toggleEl.addEventListener('click', () => setPanel(!panelOpen));
    window.addEventListener('keydown', e => {
      if (e.code === 'Tab') { e.preventDefault(); setPanel(!panelOpen); }
    });

    // ── Renderer ──────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    // ── Scene ─────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5a8fd0);
    scene.fog = new THREE.FogExp2(0x5a8fd0, 0.012);

    const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 400);
    resize();

    scene.add(new THREE.AmbientLight(0xcce0ff, 0.5));
    const sun = new THREE.DirectionalLight(0xfff5d0, 1.6);
    sun.position.set(50, 100, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 300;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
    sun.shadow.camera.right = sun.shadow.camera.top = 80;
    scene.add(sun);

    // ── Ground ────────────────────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshLambertMaterial({ color: 0x3d6b35 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ── Oval track ────────────────────────────────────────────
    const TRACK_HALF_LEN = 38;
    const TRACK_RADIUS   = 22;
    const ROAD_W         = 10;

    function buildTrackMesh() {
      const roadMat = new THREE.MeshLambertMaterial({ color: 0x303030 });
      const straightGeo = new THREE.PlaneGeometry(ROAD_W, TRACK_HALF_LEN * 2);
      [TRACK_RADIUS, -TRACK_RADIUS].forEach(x => {
        const s = new THREE.Mesh(straightGeo, roadMat);
        s.rotation.x = -Math.PI / 2;
        s.position.set(x, 0.01, 0);
        s.receiveShadow = true;
        scene.add(s);
      });
      const innerR = TRACK_RADIUS - ROAD_W / 2;
      const outerR = TRACK_RADIUS + ROAD_W / 2;
      [1, -1].forEach(flip => {
        const geo = new THREE.RingGeometry(innerR, outerR, 32, 1, 0, Math.PI);
        const mesh = new THREE.Mesh(geo, roadMat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(0, 0.01, flip * TRACK_HALF_LEN);
        if (flip > 0) mesh.rotation.z = Math.PI;
        mesh.receiveShadow = true;
        scene.add(mesh);
      });
      const dashMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
      for (let i = 0; i < 12; i++) {
        const t = (i / 12) * TRACK_HALF_LEN * 2 - TRACK_HALF_LEN;
        [-TRACK_RADIUS, TRACK_RADIUS].forEach(x => {
          const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 2.5), dashMat);
          dash.rotation.x = -Math.PI / 2;
          dash.position.set(x, 0.02, t);
          scene.add(dash);
        });
      }
      const barrierMat = new THREE.MeshLambertMaterial({ color: 0xee2222 });
      [-TRACK_RADIUS, TRACK_RADIUS].forEach(x => {
        [-1, 1].forEach(side => {
          const bar = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.6, TRACK_HALF_LEN * 2), barrierMat
          );
          bar.position.set(x + side * (ROAD_W / 2 + 0.3), 0.3, 0);
          bar.castShadow = true; bar.receiveShadow = true;
          scene.add(bar);
        });
      });
    }
    buildTrackMesh();

    // Finish line
    const finish = new THREE.Mesh(
      new THREE.PlaneGeometry(ROAD_W, 1.2),
      new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    finish.rotation.x = -Math.PI / 2;
    finish.position.set(TRACK_RADIUS, 0.03, -TRACK_HALF_LEN + 0.6);
    scene.add(finish);
    const cbSize = ROAD_W / 8;
    for (let i = 0; i < 8; i += 2) {
      const c = new THREE.Mesh(
        new THREE.PlaneGeometry(cbSize, 1.2),
        new THREE.MeshLambertMaterial({ color: 0x111111 })
      );
      c.rotation.x = -Math.PI / 2;
      c.position.set(TRACK_RADIUS - ROAD_W / 2 + cbSize * i + cbSize / 2, 0.035, -TRACK_HALF_LEN + 0.6);
      scene.add(c);
    }

    // ── Trees ─────────────────────────────────────────────────
    let _seed = 77;
    function rand() {
      _seed = (_seed * 1664525 + 1013904223) & 0xffffffff;
      return (_seed >>> 0) / 4294967296;
    }
    function addTree(x, z, h = 1) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12*h, 0.18*h, 1.2*h, 6),
        new THREE.MeshLambertMaterial({ color: 0x6b3f1e })
      );

    // ── Car ───────────────────────────────────────────────────
    const carGroup = new THREE.Group();

    [

    [-0.55, 0.55].forEach(x => {

    // Cannon barrel — mounted on car nose, points along +Z (forward)

    const wheels = [];
    [[-1.0,0.3,1.35],[1.0,0.3,1.35],[-1.0,0.3,-1.35],[1.0,0.3,-1.35]].forEach(pos => {
      const g = new THREE.Group();

      tire.rotation.z = Math.PI/2; tire.castShadow = true; g.add(tire);

    carGroup.position.set(TRACK_RADIUS, 0, -TRACK_HALF_LEN + 3);

    // ── Targets ───────────────────────────────────────────────
    // Each entry: { mesh, hitRadius (XZ), pos (world Vector3 at center) }
    const targets = [];

    function makeBarrel(x, z) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.38, 0.44, 1.4, 10),

    function makeCrate(x, z) {

    const balloonColors = [0xff3366, 0xff9900, 0x33ccff, 0xcc44ff, 0x44ff99];
    let _balloonIdx = 0;
    function makeBalloon(x, z) {

    // ── Place targets ─────────────────────────────────────────
    // Infield (inside the oval, roughly |x|<17, |z|<33)
    makeBarrel(0, 5);       makeBarrel(-6, 2);      makeBarrel(4, -9);
    makeCrate(7, 3);        makeCrate(-9, -8);      makeCrate(11, -14);
    makePoleTarget(0, 19);  makePoleTarget(0, -20);
    makeBalloon(8, 14);     makeBalloon(-8, 14);    makeBalloon(3, -5);

    makePoleTarget(0, 54);  makePoleTarget(0, -53);
    makeBalloon(28, -18);   makeBalloon(-28, -18);

    const TOTAL_TARGETS = targets.length;
    document.getElementById('score-total').textContent = ' / ' + TOTAL_TARGETS;

    // ── Projectile system ─────────────────────────────────────
    const projectiles = [];   // { mesh, vel:Vector3, life }
    const hitEffects  = [];   // { mesh, life, maxLife }

    const projMat = new THREE.MeshLambertMaterial({ color: 0xffdd44, emissive: 0xaa7700 });

    // ── Ammo state ────────────────────────────────────────────
    let ammo        = 5;      // current integer ammo count
    let ammoCharge  = 0.0;    // 0→1 progress toward next bullet

    // Build bullet dot elements (max 10; we show/hide based on ammoMax)
    const ammoBulletsEl    = document.getElementById('ammo-bullets');
    const ammoChargeFillEl = document.getElementById('ammo-charge-fill');
    const bulletEls = [];
    for (let i = 0; i < 10; i++) {
      const span = document.createElement('span');

      ammoBulletsEl.appendChild(span);

    function updateAmmoHUD() {
      const max = Math.round(P.ammoMax);
      bulletEls.forEach((el, i) => {
        if (i >= max) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        el.className = 'bullet' + (i < ammo ? '' : ' empty');
      });
      // Charge bar only visible when not full
      ammoChargeFillEl.style.width = ammo >= max ? '0%' : (ammoCharge * 100).toFixed(1) + '%';
    }

    function fireCannon() {
      const fwd = new THREE.Vector3(Math.sin(carAngle), 0, Math.cos(carAngle));
      // Spawn at world position of cannon tip (front of car, scaled)
      const spawnPos = new THREE.Vector3(
        carGroup.position.x + fwd.x * (sizeScaleDisp * 3.2),
        sizeScaleDisp * 0.72,
        carGroup.position.z + fwd.z * (sizeScaleDisp * 3.2)
      );
      const proj = new THREE.Mesh(new THREE.SphereGeometry(P.projRadius, 8, 6), projMat);
      proj.position.copy(spawnPos);
      proj.castShadow = true;
      scene.add(proj);
      projectiles.push({
        mesh: proj,
        vel: fwd.clone().multiplyScalar(P.projSpeed),
        life: P.projLifetime,
      });
    }

    function spawnHitEffect(worldPos) {
      // Two expanding rings at impact point
      [
        { r: 0.5, t: 0.15, color: 0xffaa22, life: 0.45 },
        { r: 0.3, t: 0.1,  color: 0xffffff, life: 0.30 },
      ].forEach(({ r, t, color, life }) => {
        const mesh = new THREE.Mesh(
          new THREE.TorusGeometry(r, t, 4, 16),
          new THREE.MeshLambertMaterial({ color, transparent: true, opacity: 1.0 })
        );
        mesh.position.copy(worldPos);
        mesh.position.y = Math.max(worldPos.y, 0.3);
        mesh.rotation.x = Math.PI / 2;
        scene.add(mesh);
        hitEffects.push({ mesh, life, maxLife: life });
      });
    }

    // ── Size gimmick state ────────────────────────────────────
    let sizeScale     = 1.0;   // logical size
    let sizeScaleDisp = 1.0;   // visually smoothed

    function sizeT() {
      return (sizeScale - P.sizeMin) / (P.sizeMax - P.sizeMin);
    }

    // Linear interpolation from tiny→giant using params
    function attrLerp(tiny, giant, t) { return tiny + (giant - tiny) * t; }

    // Normalization: ensure multiplier = 1.0 at sizeScale = 1.0
    function baseT() { return (1.0 - P.sizeMin) / (P.sizeMax - P.sizeMin); }

    function currentStats() {
      const t  = sizeT();
      const bt = baseT();
      return {
        maxSpeed : P.baseMaxSpeed * (attrLerp(P.speedTiny, P.speedGiant, t) / attrLerp(P.speedTiny, P.speedGiant, bt)),
        accel    : P.baseAccel    * (attrLerp(P.accelTiny, P.accelGiant, t) / attrLerp(P.accelTiny, P.accelGiant, bt)),
        brake    : P.baseBrake,
        friction : P.baseFriction,
        turnRate : P.baseTurnRate * (attrLerp(P.turnTiny,  P.turnGiant,  t) / attrLerp(P.turnTiny,  P.turnGiant,  bt)),
        hp       : attrLerp(P.hpTiny,  P.hpGiant,  t),
        atk      : attrLerp(P.atkTiny, P.atkGiant, t),
      };
    }

    function sizeName(s) {
      if (s < 0.55) return 'TINY';
      if (s < 0.75) return 'SMALL';
      if (s < 1.25) return 'NORMAL';
      if (s < 1.75) return 'BIG';
      if (s < 2.2)  return 'HUGE';
      return 'TITAN';
    }

    function sizeColor(t) {
      const r = Math.round(t * 255);
      const g = Math.round((1 - Math.abs(t - 0.5) * 2) * 200 + 55);
      const b = Math.round((1 - t) * 255);
      return `rgb(${r},${g},${b})`;
    }

    // ── HUD refs ──────────────────────────────────────────────
    const barSize   = document.getElementById('bar-size');
    const barHP     = document.getElementById('bar-hp');
    const barATK    = document.getElementById('bar-atk');
    const barTurn   = document.getElementById('bar-turn');
    const valSizeEl = document.getElementById('val-size');
    const valHPEl   = document.getElementById('val-hp');
    const valATKEl  = document.getElementById('val-atk');
    const valTurnEl = document.getElementById('val-turn');
    const sizeLabelEl = document.getElementById('size-label');
    const spdEl     = document.getElementById('spd');

    function updateHUD() {
      const t  = sizeT();
      const bt = baseT();
      const s  = currentStats();

      // size bar: position in [sizeMin, sizeMax] range
      barSize.style.width = `${Math.max(2, t * 100)}%`;
      barSize.style.background = sizeColor(t);

      // HP/ATK/Turn relative to base
      const hpBase  = attrLerp(P.hpTiny,  P.hpGiant,  bt);
      const atkBase = attrLerp(P.atkTiny, P.atkGiant, bt);
      barHP.style.width   = `${Math.min(s.hp  / hpBase  * 38, 100)}%`;
      barATK.style.width  = `${Math.min(s.atk / atkBase * 38, 100)}%`;
      barTurn.style.width = `${Math.min((s.turnRate / P.baseTurnRate) * 38, 100)}%`;

      barHP.style.background   = s.hp  > hpBase  * 1.5 ? '#ff6644' : s.hp  < hpBase  * 0.7 ? '#44ccff' : '#66dd88';
      barATK.style.background  = s.atk > atkBase * 1.5 ? '#ff6644' : '#ff9944';
      barTurn.style.background = s.turnRate > P.baseTurnRate ? '#cc88ff' : '#9955ff';

      valSizeEl.textContent = sizeScaleDisp.toFixed(2) + '×';
      valHPEl.textContent   = Math.round(s.hp  / hpBase  * 100);
      valATKEl.textContent  = Math.round(s.atk / atkBase * 100);
      valTurnEl.textContent = Math.round((s.turnRate / P.baseTurnRate) * 100);

      const name = sizeName(sizeScale);
      sizeLabelEl.textContent = name;
      sizeLabelEl.style.color = sizeColor(t);
      sizeLabelEl.style.textShadow = `0 0 16px ${sizeColor(t)}`;
    }

    // ── Lap tracking ──────────────────────────────────────────
    let lapCount = 0, bestLap = Infinity, lapStartTime = 0;
    let lapActive = false, crossedFront = false;

    function checkFinishLine(pos) {
      const near = Math.abs(pos.x - TRACK_RADIUS) < ROAD_W/2+0.5
                && Math.abs(pos.z - (-TRACK_HALF_LEN)) < 2.0;
      if (near && !crossedFront) {
        crossedFront = true;
        const now = performance.now() / 1000;
        if (lapActive) {
          const lt = now - lapStartTime;
          lapCount++;
          if (lt < bestLap) bestLap = lt;
          document.getElementById('laps').textContent = lapCount;
          document.getElementById('best').textContent = fmtTime(bestLap);
          showMsg(`Lap ${lapCount}  —  ${fmtTime(lt)}`);
        }
        lapStartTime = now; lapActive = true;
      } else if (!near) { crossedFront = false; }
    }

    function fmtTime(s) {
      return `${Math.floor(s/60)}:${(s%60).toFixed(2).padStart(5,'0')}`;
    }

    let msgTimer = null;
    const msgEl = document.getElementById('msg');
    function showMsg(text) {
      msgEl.textContent = text; msgEl.style.display = 'block';
      if (msgTimer) clearTimeout(msgTimer);
      msgTimer = setTimeout(() => { msgEl.style.display = 'none'; }, 2200);
    }

    // ── Input ─────────────────────────────────────────────────
    const keys = {};
    let score = 0;
    const scoreEl = document.getElementById('score');

    window.addEventListener('keydown', e => {
      if (e.code === 'Tab') return;
      keys[e.code] = true;
      // Fire on initial press only (not key-repeat)
      if (e.code === 'Space' && !e.repeat) {
        if (ammo > 0) {
          ammo--;
          ammoCharge = ammoCharge; // preserve fractional progress
          fireCannon();
        }
      }
      e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // ── Physics state ─────────────────────────────────────────
    let speed = 0;
    const smoothCamPos = new THREE.Vector3(TRACK_RADIUS, 4, -TRACK_HALF_LEN + 3 - 10);
    const camLookAt    = new THREE.Vector3();
    const clock        = new THREE.Clock();

    // ── Update ────────────────────────────────────────────────
    function update(dt) {
      // Size input — X = grow, Z = shrink
      if (keys['KeyX']) sizeScale = Math.min(sizeScale + P.sizeRate * dt, P.sizeMax);
      if (keys['KeyZ']) sizeScale = Math.max(sizeScale - P.sizeRate * dt, P.sizeMin);

      // Clamp in case sizeMin/sizeMax slider moved
      sizeScale = Math.max(P.sizeMin, Math.min(P.sizeMax, sizeScale));

      // Visual lerp
      sizeScaleDisp += (sizeScale - sizeScaleDisp) * Math.min(1, P.sizeLerp * dt);
      carGroup.scale.setScalar(sizeScaleDisp);
      carGroup.position.y = 0;

      // Stats
      const s = currentStats();

      // Drive
      const fwd   = keys['KeyW'] || keys['ArrowUp'];
      const back  = keys['KeyS'] || keys['ArrowDown'];
      const left  = keys['KeyA'] || keys['ArrowLeft'];
      const right = keys['KeyD'] || keys['ArrowRight'];

      if (fwd)       speed = Math.min(speed + s.accel * dt,   s.maxSpeed);
      else if (back) speed = Math.max(speed - s.brake * dt,  -s.maxSpeed * 0.4);
      else {
        const f = s.friction * dt;
        speed = Math.abs(speed) < f ? 0 : speed - Math.sign(speed) * f;
      }

      const speedFrac = Math.abs(speed) / s.maxSpeed;
      const turn = s.turnRate * dt * speedFrac * Math.sign(speed || 1);
      if (left)  carAngle += turn;
      if (right) carAngle -= turn;

      carGroup.position.x += Math.sin(carAngle) * speed * dt;
      carGroup.position.z += Math.cos(carAngle) * speed * dt;
      carGroup.rotation.y = carAngle;

      const wheelR = 0.3 * sizeScaleDisp;
      wheels.forEach(w => { w.rotation.x += (speed * dt) / wheelR; });

      // Camera
      const camDist = 11 * Math.max(0.7, sizeScaleDisp * 0.8);
      const camH    = 4.5 * Math.max(0.7, sizeScaleDisp * 0.7);
      smoothCamPos.lerp(new THREE.Vector3(
        carGroup.position.x - Math.sin(carAngle) * camDist,
        camH,
        carGroup.position.z - Math.cos(carAngle) * camDist
      ), 7 * dt);
      camera.position.copy(smoothCamPos);
      camLookAt.set(
        carGroup.position.x + Math.sin(carAngle) * 4,
        1.2 * sizeScaleDisp,
        carGroup.position.z + Math.cos(carAngle) * 4
      );
      camera.lookAt(camLookAt);

      sun.position.set(carGroup.position.x + 50, 100, carGroup.position.z + 30);
      sun.target.position.copy(carGroup.position);
      sun.target.updateMatrixWorld();

      // ── Ammo recharge ────────────────────────────────────────
      const maxAmmo = Math.round(P.ammoMax);
      if (ammo < maxAmmo) {
        ammoCharge += dt / P.ammoRecharge;
        if (ammoCharge >= 1.0) {
          ammo++;
          ammoCharge = 0.0;
        }
      } else {
        ammoCharge = 0.0;
      }
      // Clamp in case ammoMax slider decreased
      ammo = Math.min(ammo, maxAmmo);
      updateAmmoHUD();

      spdEl.textContent = Math.abs(speed * 3.6).toFixed(0);
      checkFinishLine(carGroup.position);
      updateHUD();

      // ── Projectiles ──────────────────────────────────────────
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.life -= dt;
        p.mesh.position.addScaledVector(p.vel, dt);

        // XZ-only collision against targets (height-agnostic for POC)
        let hit = false;
        for (let j = targets.length - 1; j >= 0; j--) {
          const tgt = targets[j];
          const dx = p.mesh.position.x - tgt.pos.x;
          const dz = p.mesh.position.z - tgt.pos.z;
          if (Math.sqrt(dx*dx + dz*dz) < tgt.hitRadius + P.projRadius) {
            spawnHitEffect(p.mesh.position.clone());
            scene.remove(tgt.mesh);
            targets.splice(j, 1);
            score++;
            scoreEl.textContent = score;
            hit = true;
            break;
          }
        }

        if (hit || p.life <= 0) {
          scene.remove(p.mesh);
          projectiles.splice(i, 1);
        }
      }

      // ── Hit effects ──────────────────────────────────────────
      for (let i = hitEffects.length - 1; i >= 0; i--) {
        const e = hitEffects[i];
        e.life -= dt;
        const t = 1 - e.life / e.maxLife;
        e.mesh.scale.setScalar(1 + t * 4);
        e.mesh.material.opacity = 1 - t;
        if (e.life <= 0) {
          scene.remove(e.mesh);
          hitEffects.splice(i, 1);
        }
      }
    }

    // ── Render loop ───────────────────────────────────────────
    function loop() {
      requestAnimationFrame(loop);
      update(Math.min(clock.getDelta(), 0.05));
      renderer.render(scene, camera);
    }
    loop();
  </script>
