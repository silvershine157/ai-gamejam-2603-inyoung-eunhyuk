<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>v10 - Race Start Prototype</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.52);
      padding: 8px 14px;
      border-radius: 6px;
      line-height: 1.9;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #hud .label { color: #7d8796; }
    #hud .val { color: #8bc7ff; font-weight: bold; }
    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: rgba(0, 0, 0, 0.66);
      padding: 14px 28px;
      border-radius: 10px;
      pointer-events: none;
      display: none;
    }
    #countdown {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: clamp(42px, 12vw, 110px);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #f7fbff;
      text-shadow: 0 0 30px rgba(126, 184, 247, 0.35);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    #countdown.visible {
      opacity: 1;
    }
    #minimap-hud {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 226px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      pointer-events: none;
      color: #d7e5f7;
      font-family: monospace;
      box-sizing: border-box;
    }
    #minimap-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      color: #89bfff;
    }
    #minimap {
      display: block;
      width: 206px;
      height: 206px;
      border-radius: 6px;
      background: rgba(8, 18, 28, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #map-menu {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 8, 14, 0.6);
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    #map-menu.hidden {
      display: none;
    }
    #map-menu-panel {
      width: min(640px, calc(100vw - 32px));
      background: rgba(7, 14, 24, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 22px;
      color: #f4f7fb;
      font-family: monospace;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    #map-menu-title {
      font-size: 22px;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      color: #89bfff;
    }
    #map-menu-copy {
      font-size: 13px;
      line-height: 1.7;
      color: #9db2c8;
      margin-bottom: 16px;
    }
    #map-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .map-option {
      text-align: left;
      padding: 14px 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(18, 29, 43, 0.88);
      color: #e7eef8;
      cursor: pointer;
    }
    .map-option:hover {
      border-color: rgba(126, 184, 247, 0.55);
      background: rgba(22, 40, 61, 0.96);
    }
    .map-option-title {
      font-size: 16px;
      margin-bottom: 8px;
      color: #d9ecff;
    }
    .map-option-copy {
      font-size: 12px;
      line-height: 1.65;
      color: #9db2c8;
      min-height: 58px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">SPEED   </span><span class="val" id="spd">0</span> km/h</div>
    <div><span class="label">LAPS    </span><span class="val" id="laps">0</span></div>
    <div><span class="label">BEST    </span><span class="val" id="best">--:--</span></div>
    <div><span class="label">OFFROAD </span><span class="val" id="offroad">0.0</span> s</div>
    <div><span class="label">CONTROLS</span> WASD / Arrows</div>
  </div>
  <div id="msg"></div>
  <div id="countdown"></div>
  <div id="minimap-hud">
    <div id="minimap-title">MINIMAP</div>
    <canvas id="minimap" width="206" height="206"></canvas>
  </div>
  <div id="map-menu">
    <div id="map-menu-panel">
      <div id="map-menu-title">SELECT MAP</div>
      <div id="map-menu-copy">Start with the classic oval or switch to a spline-based grand prix track with a narrow shortcut lane.</div>
      <div id="map-options">
        <button class="map-option" data-map="oval">
          <div class="map-option-title">Oval Circuit</div>
          <div class="map-option-copy">High-speed test loop. Wall sections on the straights and broad runoff elsewhere.</div>
        </button>
        <button class="map-option" data-map="grandprix">
          <div class="map-option-title">Grand Prix Shortcut</div>
          <div class="map-option-copy">Spline main loop with an open shortcut branch cutting through the infield.</div>
        </button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    document.title = 'v10 - Race Start Prototype';

    const searchParams = new URLSearchParams(window.location.search);
    const requestedMapId = searchParams.get('map');
    let controlsEnabled = false;

    const WORLD_UP = new THREE.Vector3(0, 1, 0);
    const LOCAL_FORWARD = new THREE.Vector3(0, 0, 1);
    const LOCAL_UP = new THREE.Vector3(0, 1, 0);

    const tempRight = new THREE.Vector3();
    const tempUp = new THREE.Vector3();
    const tempForward = new THREE.Vector3();
    const tempA = new THREE.Vector3();
    const tempB = new THREE.Vector3();
    const tempC = new THREE.Vector3();
    const tempD = new THREE.Vector3();
    const tempE = new THREE.Vector3();
    const tempF = new THREE.Vector3();
    const tempG = new THREE.Vector2();
    const tempMatrix = new THREE.Matrix4();

    function wrap01(value) {
      return ((value % 1) + 1) % 1;
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function wrapProgressDelta(delta) {
      if (delta > 0.5) return delta - 1;
      if (delta < -0.5) return delta + 1;
      return delta;
    }

    function setQuaternionFromForwardUp(target, forward, up = WORLD_UP) {
      tempForward.copy(forward).normalize();
      tempRight.crossVectors(up, tempForward).normalize();
      tempUp.crossVectors(tempForward, tempRight).normalize();
      tempMatrix.makeBasis(tempRight, tempUp, tempForward);
      target.setFromRotationMatrix(tempMatrix);
      return target;
    }

    function addTriangle(positions, normals, a, b, c) {
      positions.push(
        a.x, a.y, a.z,
        b.x, b.y, b.z,
        c.x, c.y, c.z
      );
      for (let i = 0; i < 3; i++) {
        normals.push(0, 1, 0);
      }
    }

    class OvalCenterlineCurve extends THREE.Curve {
      constructor(radius, straightHalfLength) {
        super();
        this.radius = radius;
        this.straightHalfLength = straightHalfLength;
        this.straightLength = straightHalfLength * 2;
        this.arcLength = Math.PI * radius;
        this.totalLength = this.straightLength * 2 + this.arcLength * 2;
      }

      getPoint(t, target = new THREE.Vector3()) {
        const s = wrap01(t) * this.totalLength;

        if (s < this.straightLength) {
          return target.set(this.radius, 0, -this.straightHalfLength + s);
        }

        if (s < this.straightLength + this.arcLength) {
          const arcS = s - this.straightLength;
          const angle = arcS / this.radius;
          return target.set(
            Math.cos(angle) * this.radius,
            0,
            this.straightHalfLength + Math.sin(angle) * this.radius
          );
        }

        if (s < this.straightLength * 2 + this.arcLength) {
          const straightS = s - this.straightLength - this.arcLength;
          return target.set(-this.radius, 0, this.straightHalfLength - straightS);
        }

        const arcS = s - this.straightLength * 2 - this.arcLength;
        const angle = Math.PI + arcS / this.radius;
        return target.set(
          Math.cos(angle) * this.radius,
          0,
          -this.straightHalfLength + Math.sin(angle) * this.radius
        );
      }

      getTangent(t, target = new THREE.Vector3()) {
        const s = wrap01(t) * this.totalLength;

        if (s < this.straightLength) {
          return target.set(0, 0, 1);
        }

        if (s < this.straightLength + this.arcLength) {
          const arcS = s - this.straightLength;
          const angle = arcS / this.radius;
          return target.set(-Math.sin(angle), 0, Math.cos(angle)).normalize();
        }

        if (s < this.straightLength * 2 + this.arcLength) {
          return target.set(0, 0, -1);
        }

        const arcS = s - this.straightLength * 2 - this.arcLength;
        const angle = Math.PI + arcS / this.radius;
        return target.set(-Math.sin(angle), 0, Math.cos(angle)).normalize();
      }

      getPointAt(u, target = new THREE.Vector3()) {
        return this.getPoint(u, target);
      }

      getTangentAt(u, target = new THREE.Vector3()) {
        return this.getTangent(u, target);
      }
    }

    class CurveRoad {
      constructor({ curve, width, sampleCount = 240, wallRanges = [], closed = true }) {
        this.curve = curve;
        this.width = width;
        this.halfWidth = width * 0.5;
        this.sampleCount = sampleCount;
        this.wallRanges = wallRanges;
        this.closed = closed;
        this.frames = [];
        this.length = 0;
        this.resample();
      }

      resample() {
        this.frames = [];
        this.length = 0;

        let previousPoint = null;
        for (let i = 0; i < this.sampleCount; i++) {
          const t = i / this.sampleCount;
          const point = this.curve.getPointAt(t, new THREE.Vector3());
          const tangent = this.curve.getTangentAt(t, new THREE.Vector3()).normalize();
          const right = new THREE.Vector3().crossVectors(tangent, WORLD_UP).normalize();

          if (previousPoint) {
            this.length += previousPoint.distanceTo(point);
          }

          this.frames.push({ t, point, tangent, right });
          previousPoint = point;
        }

        if (this.closed) {
          this.length += this.frames[this.frames.length - 1].point.distanceTo(this.frames[0].point);
        }
      }

      getFrameAt(t) {
        const point = this.curve.getPointAt(wrap01(t), new THREE.Vector3());
        const tangent = this.curve.getTangentAt(wrap01(t), new THREE.Vector3()).normalize();
        const right = new THREE.Vector3().crossVectors(tangent, WORLD_UP).normalize();
        return { point, tangent, right, t: wrap01(t) };
      }

      inRange(t, start, end) {
        if (!this.closed) {
          return t >= start && t <= end;
        }
        const wrapped = wrap01(t);
        const a = wrap01(start);
        const b = wrap01(end);
        if (a <= b) return wrapped >= a && wrapped <= b;
        return wrapped >= a || wrapped <= b;
      }

      getWallConfigAt(t) {
        const config = { left: false, right: false };
        for (const range of this.wallRanges) {
          if (!this.inRange(t, range.start, range.end)) continue;
          config.left = config.left || !!range.left;
          config.right = config.right || !!range.right;
        }
        return config;
      }

      projectPoint(point) {
        let bestDistanceSq = Infinity;
        let bestT = 0;
        const bestPoint = new THREE.Vector3();
        const bestTangent = new THREE.Vector3();
        const bestRight = new THREE.Vector3();

        const px = point.x;
        const pz = point.z;

        const segmentCount = this.closed ? this.frames.length : this.frames.length - 1;
        for (let i = 0; i < segmentCount; i++) {
          const a = this.frames[i];
          const b = this.closed ? this.frames[(i + 1) % this.frames.length] : this.frames[i + 1];
          const vx = b.point.x - a.point.x;
          const vz = b.point.z - a.point.z;
          const lenSq = vx * vx + vz * vz;
          if (lenSq === 0) continue;

          const apx = px - a.point.x;
          const apz = pz - a.point.z;
          const u = clamp01((apx * vx + apz * vz) / lenSq);
          const cx = a.point.x + vx * u;
          const cz = a.point.z + vz * u;
          const dx = px - cx;
          const dz = pz - cz;
          const distSq = dx * dx + dz * dz;

          if (distSq >= bestDistanceSq) continue;

          bestDistanceSq = distSq;
          bestPoint.set(cx, 0, cz);
          bestTangent.set(vx, 0, vz).normalize();
          bestRight.crossVectors(bestTangent, WORLD_UP).normalize();
          const normalized = segmentCount <= 0 ? 0 : (i + u) / segmentCount;
          bestT = this.closed ? wrap01(normalized) : clamp01(normalized);
        }

        return {
          distanceSq: bestDistanceSq,
          closestPoint: bestPoint,
          tangent: bestTangent,
          right: bestRight,
          t: bestT,
        };
      }

      containsPoint(point, margin = 0) {
        const radius = this.halfWidth - margin;
        if (radius <= 0) return false;
        const projection = this.projectPoint(point);
        return projection.distanceSq <= radius * radius;
      }

      buildSurface(scene) {
        const positions = [];
        const normals = [];

        const segmentCount = this.closed ? this.frames.length : this.frames.length - 1;
        for (let i = 0; i < segmentCount; i++) {
          const a = this.frames[i];
          const b = this.closed ? this.frames[(i + 1) % this.frames.length] : this.frames[i + 1];

          const leftA = a.point.clone().addScaledVector(a.right, -this.halfWidth);
          const rightA = a.point.clone().addScaledVector(a.right, this.halfWidth);
          const leftB = b.point.clone().addScaledVector(b.right, -this.halfWidth);
          const rightB = b.point.clone().addScaledVector(b.right, this.halfWidth);

          addTriangle(positions, normals, leftA, rightA, leftB);
          addTriangle(positions, normals, rightA, rightB, leftB);
        }

        const roadGeo = new THREE.BufferGeometry();
        roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        roadGeo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));

        const roadMesh = new THREE.Mesh(
          roadGeo,
          new THREE.MeshLambertMaterial({ color: 0x303030 })
        );
        roadMesh.receiveShadow = true;
        scene.add(roadMesh);

        const dashMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const dashLength = 2.6;
        const dashSpacing = 7.5;
        const dashCount = Math.floor(this.length / dashSpacing);
        for (let i = 0; i < dashCount; i++) {
          const t = wrap01((i * dashSpacing + dashSpacing * 0.5) / this.length);
          const frame = this.getFrameAt(t);
          const dash = new THREE.Mesh(
            new THREE.BoxGeometry(0.24, 0.02, dashLength),
            dashMat
          );
          dash.position.copy(frame.point).setY(0.02);
          setQuaternionFromForwardUp(dash.quaternion, frame.tangent, WORLD_UP);
          scene.add(dash);
        }
      }

      buildFinishLine(scene, t = 0) {
        const frame = this.getFrameAt(t);
        const finish = new THREE.Mesh(
          new THREE.BoxGeometry(this.width, 0.02, 1.2),
          new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        finish.position.copy(frame.point).setY(0.03);
        setQuaternionFromForwardUp(finish.quaternion, frame.tangent, WORLD_UP);
        scene.add(finish);

        const checkers = 8;
        const cellWidth = this.width / checkers;
        for (let i = 0; i < checkers; i++) {
          if (i % 2 !== 0) continue;
          const cell = new THREE.Mesh(
            new THREE.BoxGeometry(cellWidth, 0.021, 1.2),
            new THREE.MeshLambertMaterial({ color: 0x111111 })
          );
          cell.position.copy(frame.point)
            .addScaledVector(frame.right, -this.halfWidth + cellWidth * i + cellWidth * 0.5)
            .setY(0.031);
          setQuaternionFromForwardUp(cell.quaternion, frame.tangent, WORLD_UP);
          scene.add(cell);
        }

        return frame;
      }

      addWallSegment(scene, frameA, frameB, side, options) {
        const sideSign = side === 'left' ? -1 : 1;
        const edgeA = frameA.point.clone().addScaledVector(frameA.right, sideSign * this.halfWidth);
        const edgeB = frameB.point.clone().addScaledVector(frameB.right, sideSign * this.halfWidth);

        const inward = frameA.right.clone().add(frameB.right).normalize()
          .multiplyScalar(side === 'left' ? 1 : -1);

        const centerA = edgeA.clone().addScaledVector(inward, options.thickness * 0.5);
        const centerB = edgeB.clone().addScaledVector(inward, options.thickness * 0.5);
        const wallForward = centerB.clone().sub(centerA).setY(0);
        const wallLength = wallForward.length();
        if (wallLength < 0.01) return null;

        const wall = new THREE.Mesh(
          new THREE.BoxGeometry(options.thickness, options.height, wallLength + 0.05),
          new THREE.MeshLambertMaterial({ color: 0xee2222 })
        );
        wall.position.copy(centerA).lerp(centerB, 0.5).setY(options.height * 0.5);
        setQuaternionFromForwardUp(wall.quaternion, wallForward.normalize(), WORLD_UP);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);

        return {
          a: edgeA,
          b: edgeB,
          normal: inward,
          halfThickness: options.thickness * 0.5,
        };
      }

      buildWalls(scene, options = {}) {
        const wallOptions = {
          thickness: options.thickness ?? 0.35,
          height: options.height ?? 0.6,
        };
        const colliders = [];

        const segmentCount = this.closed ? this.frames.length : this.frames.length - 1;
        for (let i = 0; i < segmentCount; i++) {
          const a = this.frames[i];
          const b = this.closed ? this.frames[(i + 1) % this.frames.length] : this.frames[i + 1];
          const tMid = this.closed ? wrap01((a.t + b.t) * 0.5) : (a.t + b.t) * 0.5;
          const wallConfig = this.getWallConfigAt(tMid);

          if (wallConfig.left) {
            const collider = this.addWallSegment(scene, a, b, 'left', wallOptions);
            if (collider) colliders.push(collider);
          }

          if (wallConfig.right) {
            const collider = this.addWallSegment(scene, a, b, 'right', wallOptions);
            if (collider) colliders.push(collider);
          }
        }

        return colliders;
      }
    }

    class RoadNetwork {
      constructor(roads) {
        this.roads = roads;
      }

      buildSurface(scene) {
        this.roads.forEach((road) => road.buildSurface(scene));
      }

      buildWalls(scene, options = {}) {
        return this.roads.flatMap((road) => road.buildWalls(scene, options));
      }

      containsPoint(point, margin = 0) {
        return this.roads.some((road) => road.containsPoint(point, margin));
      }

      projectPoint(point) {
        let best = null;
        for (const road of this.roads) {
          const projection = road.projectPoint(point);
          if (!best || projection.distanceSq < best.distanceSq) {
            best = { ...projection, road };
          }
        }
        return best;
      }

      computeBounds(padding = 12) {
        let minX = Infinity;
        let maxX = -Infinity;
        let minZ = Infinity;
        let maxZ = -Infinity;

        for (const road of this.roads) {
          for (const frame of road.frames) {
            minX = Math.min(minX, frame.point.x - road.halfWidth);
            maxX = Math.max(maxX, frame.point.x + road.halfWidth);
            minZ = Math.min(minZ, frame.point.z - road.halfWidth);
            maxZ = Math.max(maxZ, frame.point.z + road.halfWidth);
          }
        }

        return {
          minX: minX - padding,
          maxX: maxX + padding,
          minZ: minZ - padding,
          maxZ: maxZ + padding,
        };
      }
    }

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5a8fd0);
    scene.fog = new THREE.FogExp2(0x5a8fd0, 0.012);

    const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 400);

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    scene.add(new THREE.AmbientLight(0xcce0ff, 0.5));

    const sun = new THREE.DirectionalLight(0xfff5d0, 1.6);
    sun.position.set(50, 100, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 300;
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshLambertMaterial({
        color: 0x3d6b35,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1,
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.05;
    ground.receiveShadow = true;
    scene.add(ground);

    function addGrandstand(position) {
      const mat = new THREE.MeshLambertMaterial({ color: 0x607d8b });
      const stand = new THREE.Mesh(new THREE.BoxGeometry(18, 3, 4), mat);
      stand.position.copy(position).setY(1.5);
      stand.castShadow = true;
      stand.receiveShadow = true;
      scene.add(stand);

      const seatMat = new THREE.MeshLambertMaterial({ color: 0xe53935 });
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 9; col++) {
          const seat = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 0.8), seatMat);
          seat.position.copy(position).add(new THREE.Vector3(
            -7 + col * 1.8,
            -0.7 + row * 0.8,
            1.8 + row * 0.5
          ));
          scene.add(seat);
        }
      }
    }

    function buildOvalMap() {
      const trackHalfLen = 38;
      const trackRadius = 22;
      const roadWidth = 10;
      const centerCurve = new OvalCenterlineCurve(trackRadius, trackHalfLen);
      const straightSpan = centerCurve.straightLength / centerCurve.totalLength;
      const arcSpan = centerCurve.arcLength / centerCurve.totalLength;
      const mainRoad = new CurveRoad({
        curve: centerCurve,
        width: roadWidth,
        sampleCount: 280,
        closed: true,
        wallRanges: [
          { start: 0.0, end: straightSpan, left: true, right: true },
          {
            start: straightSpan + arcSpan,
            end: straightSpan + arcSpan + straightSpan,
            left: true,
            right: true,
          },
        ],
      });
      const network = new RoadNetwork([mainRoad]);
      network.buildSurface(scene);
      const finishFrame = mainRoad.buildFinishLine(scene, 0);
      const wallColliders = network.buildWalls(scene, { thickness: 0.35, height: 0.6 });
      addGrandstand(new THREE.Vector3(0, 0, -(trackHalfLen + trackRadius + 5)));

      return {
        id: 'oval',
        label: 'OVAL CIRCUIT',
        network,
        lapRoad: mainRoad,
        progressForProjection(projection) {
          return projection.t;
        },
        projectLapProgress(point) {
          const projection = mainRoad.projectPoint(point);
          return {
            projection,
            progress: projection.t,
          };
        },
        finishFrame,
        wallColliders,
        startFrame: mainRoad.getFrameAt(0.03),
      };
    }

    function buildGrandPrixMap() {
      const mainCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-16, 0, -78),
        new THREE.Vector3(28, 0, -80),
        new THREE.Vector3(66, 0, -62),
        new THREE.Vector3(84, 0, -34),
        new THREE.Vector3(82, 0, -2),
        new THREE.Vector3(66, 0, 22),
        new THREE.Vector3(44, 0, 40),
        new THREE.Vector3(58, 0, 70),
        new THREE.Vector3(30, 0, 88),
        new THREE.Vector3(-8, 0, 82),
        new THREE.Vector3(-46, 0, 64),
        new THREE.Vector3(-78, 0, 34),
        new THREE.Vector3(-82, 0, -4),
        new THREE.Vector3(-56, 0, -32),
        new THREE.Vector3(-18, 0, -18),
        new THREE.Vector3(-34, 0, -62),
      ], true, 'catmullrom', 0.32);

      const mainRoad = new CurveRoad({
        curve: mainCurve,
        width: 11,
        sampleCount: 360,
        closed: true,
        wallRanges: [
          { start: 0.0, end: 0.11, left: true, right: true },
          { start: 0.29, end: 0.43, left: true, right: false },
          { start: 0.58, end: 0.76, left: false, right: true },
        ],
      });

      const shortcutEntry = mainRoad.getFrameAt(0.23);
      const shortcutExit = mainRoad.getFrameAt(0.5);
      const shortcutCurve = new THREE.CatmullRomCurve3([
        shortcutEntry.point.clone(),
        shortcutEntry.point.clone()
          .addScaledVector(shortcutEntry.tangent, 4)
          .addScaledVector(shortcutEntry.right, -4.5),
        new THREE.Vector3(30, 0, 34),
        new THREE.Vector3(18, 0, 52),
        new THREE.Vector3(4, 0, 66),
        shortcutExit.point.clone()
          .addScaledVector(shortcutExit.tangent, -4)
          .addScaledVector(shortcutExit.right, 4.5),
        shortcutExit.point.clone(),
      ], false, 'catmullrom', 0.2);

      const shortcutRoad = new CurveRoad({
        curve: shortcutCurve,
        width: 5.2,
        sampleCount: 120,
        closed: false,
        wallRanges: [
          { start: 0.1, end: 0.9, left: true, right: true },
        ],
      });

      const network = new RoadNetwork([mainRoad, shortcutRoad]);
      network.buildSurface(scene);
      const finishFrame = mainRoad.buildFinishLine(scene, 0);
      const wallColliders = network.buildWalls(scene, { thickness: 0.35, height: 0.6 });
      addGrandstand(new THREE.Vector3(-8, 0, -83));

      return {
        id: 'grandprix',
        label: 'GRAND PRIX SHORTCUT',
        network,
        lapRoad: mainRoad,
        shortcutRoad,
        shortcutEntryT: shortcutEntry.t,
        shortcutExitT: shortcutExit.t,
        progressForProjection(projection) {
          if (projection.road === shortcutRoad) {
            return shortcutEntry.t + (shortcutExit.t - shortcutEntry.t) * projection.t;
          }
          return projection.t;
        },
        projectLapProgress(point, previousProgress = null) {
          const candidates = [
            {
              road: mainRoad,
              projection: mainRoad.projectPoint(point),
            },
            {
              road: shortcutRoad,
              projection: shortcutRoad.projectPoint(point),
            },
          ];

          let best = null;
          for (const candidate of candidates) {
            const projection = candidate.projection;
            const progress = wrap01(this.progressForProjection({ ...projection, road: candidate.road }));
            const delta = previousProgress === null ? 0 : Math.abs(wrapProgressDelta(progress - previousProgress));
            const continuityPenalty = delta * delta * 120;
            const score = projection.distanceSq + continuityPenalty;
            if (!best || score < best.score) {
              best = {
                projection: { ...projection, road: candidate.road },
                progress,
                score,
              };
            }
          }

          return best;
        },
        finishFrame,
        wallColliders,
        startFrame: mainRoad.getFrameAt(0.025),
      };
    }

    const mapFactories = {

    function measureRoadSpan(road, startT, endT, steps = 120) {
      let length = 0;
      const span = endT >= startT ? endT - startT : 1 - startT + endT;
      let prev = road.getFrameAt(startT).point.clone();
      for (let i = 1; i <= steps; i++) {
        const t = wrap01(startT + span * (i / steps));
        const point = road.getFrameAt(t).point;
        length += prev.distanceTo(point);
        prev = point.clone();
      }
      return length;
    }

    const shortcutMetrics = trackMap.shortcutRoad ? {

    function worldToMinimap(x, z, out = tempG) {
      const width = minimapCanvas.width;
      const height = minimapCanvas.height;
      const spanX = Math.max(1, minimapBounds.maxX - minimapBounds.minX);
      const spanZ = Math.max(1, minimapBounds.maxZ - minimapBounds.minZ);
      const scale = Math.min((width - 24) / spanX, (height - 24) / spanZ);
      const drawWidth = spanX * scale;
      const drawHeight = spanZ * scale;
      const offsetX = (width - drawWidth) * 0.5;
      const offsetY = (height - drawHeight) * 0.5;

      out.set(
        width - (offsetX + (x - minimapBounds.minX) * scale),
        height - (offsetY + (z - minimapBounds.minZ) * scale)
      );
      return out;
    }

    function minimapPoint(x, z) {
      return worldToMinimap(x, z, new THREE.Vector2());
    }

    function drawMinimap() {
      const width = minimapCanvas.width;
      const height = minimapCanvas.height;

      minimapCtx.fillStyle = '#09141d';
      minimapCtx.fillRect(0, 0, width, height);

      minimapCtx.strokeStyle = 'rgba(110, 168, 112, 0.18)';
      minimapCtx.lineWidth = 1;
      for (let i = 22; i < width; i += 22) {
        minimapCtx.beginPath();
        minimapCtx.moveTo(i, 0);
        minimapCtx.lineTo(i, height);
        minimapCtx.stroke();
      }
      for (let i = 22; i < height; i += 22) {
        minimapCtx.beginPath();
        minimapCtx.moveTo(0, i);
        minimapCtx.lineTo(width, i);
        minimapCtx.stroke();
      }

      minimapCtx.lineCap = 'round';
      minimapCtx.lineJoin = 'round';
      for (const road of roadNetwork.roads) {
        minimapCtx.strokeStyle = road.closed ? '#6f7984' : '#88d0ff';
        minimapCtx.lineWidth = Math.max(4, road.width * 1.05);
        minimapCtx.beginPath();
        road.frames.forEach((frame, index) => {
          const p = worldToMinimap(frame.point.x, frame.point.z);
          if (index === 0) minimapCtx.moveTo(p.x, p.y);
          else minimapCtx.lineTo(p.x, p.y);
        });
        if (road.closed) {
          const first = worldToMinimap(road.frames[0].point.x, road.frames[0].point.z);
          minimapCtx.lineTo(first.x, first.y);
        }
        minimapCtx.stroke();
      }

      minimapCtx.strokeStyle = '#f04e43';
      minimapCtx.lineWidth = 2;
      for (const wall of wallColliders) {
        const a = minimapPoint(wall.a.x, wall.a.z);
        const b = minimapPoint(wall.b.x, wall.b.z);
        minimapCtx.beginPath();
        minimapCtx.moveTo(a.x, a.y);
        minimapCtx.lineTo(b.x, b.y);
        minimapCtx.stroke();
      }

      const finishA = finishFrame.point.clone().addScaledVector(finishFrame.right, -lapRoad.halfWidth);
      const finishB = finishFrame.point.clone().addScaledVector(finishFrame.right, lapRoad.halfWidth);
      const finishMapA = minimapPoint(finishA.x, finishA.z);
      const finishMapB = minimapPoint(finishB.x, finishB.z);
      minimapCtx.strokeStyle = '#f8f8f8';
      minimapCtx.lineWidth = 3;
      minimapCtx.beginPath();
      minimapCtx.moveTo(finishMapA.x, finishMapA.y);
      minimapCtx.lineTo(finishMapB.x, finishMapB.y);
      minimapCtx.stroke();

      const carMapPos = worldToMinimap(carGroup.position.x, carGroup.position.z);
      getCarForward(carForward);
      const headingLength = 11;

      minimapCtx.fill();

      minimapCtx.strokeStyle = '#d9f7ff';
      minimapCtx.lineWidth = 2;
      minimapCtx.beginPath();
      minimapCtx.moveTo(carMapPos.x, carMapPos.y);
      minimapCtx.lineTo(
        carMapPos.x - carForward.x * headingLength,
        carMapPos.y - carForward.z * headingLength
      );
      minimapCtx.stroke();
    }

    function rng(seed) {

    const rand = rng(activeMapId === 'grandprix' ? 191 : 77);

    const wheels = [];

    const startFrame = trackMap.startFrame;

    let lapCount = 0;

    function fmtTime(seconds) {

    class LapTracker {
      constructor({ sectorCount = 12, minForwardProgress = 0.86, maxReverseProgress = 0.35 }) {
        this.sectorCount = sectorCount;
        this.minForwardProgress = minForwardProgress;
        this.maxReverseProgress = maxReverseProgress;
        this.requiredVisitedCount = sectorCount - 1;
        this.visitedSectors = new Array(sectorCount).fill(false);
        this.visitedCount = 0;
        this.forwardProgress = 0;
        this.reverseProgress = 0;
        this.lastProgress = null;
      }

      markSector(progress) {
        const wrapped = wrap01(progress);
        const index = Math.min(this.sectorCount - 1, Math.floor(wrapped * this.sectorCount));
        if (!this.visitedSectors[index]) {
          this.visitedSectors[index] = true;
          this.visitedCount += 1;
        }
      }

      markRange(startProgress, endProgress) {
        let delta = endProgress - startProgress;
        if (delta < 0) delta += 1;
        const steps = Math.max(1, Math.ceil(delta * this.sectorCount * 3));
        for (let i = 0; i <= steps; i++) {
          const progress = wrap01(startProgress + delta * (i / steps));
          this.markSector(progress);
        }
      }

      projectProgress(point) {
        const projected = trackMap.projectLapProgress
          ? trackMap.projectLapProgress(point, this.lastProgress)
          : null;
        if (projected) {
          return {
            projection: projected.projection,
            progress: wrap01(projected.progress),
          };
        }
        const projection = roadNetwork.projectPoint(point);
        if (!projection) return null;
        return {
          projection,
          progress: wrap01(trackMap.progressForProjection(projection)),
        };
      }

      resetAt(progress) {
        this.visitedSectors.fill(false);
        this.visitedCount = 0;
        this.forwardProgress = 0;
        this.reverseProgress = 0;
        this.lastProgress = wrap01(progress);
        this.markSector(this.lastProgress);
      }

      resetFromPoint(point) {
        const sample = this.projectProgress(point);
        this.resetAt(sample ? sample.progress : 0);
      }

      update(point) {
        const sample = this.projectProgress(point);
        if (!sample) return null;

        if (this.lastProgress === null) {
          this.resetAt(sample.progress);
          return { ...sample, delta: 0 };
        }

        const delta = wrapProgressDelta(sample.progress - this.lastProgress);
        if (Math.abs(delta) < 0.35) {
          if (delta > 0.0005) {
            this.forwardProgress += delta;
            this.markRange(this.lastProgress, sample.progress);
          } else if (delta < -0.0005) {
            this.reverseProgress += -delta;
          }
        }

        this.lastProgress = sample.progress;
        return { ...sample, delta };
      }

      canCountLap() {
        return (
          this.forwardProgress >= this.minForwardProgress &&
          this.visitedCount >= this.requiredVisitedCount &&
          this.reverseProgress <= this.maxReverseProgress
        );
      }

      getState() {
        return {
          forwardProgress: this.forwardProgress,
          reverseProgress: this.reverseProgress,
          visitedCount: this.visitedCount,
          requiredVisitedCount: this.requiredVisitedCount,
          lastProgress: this.lastProgress,
          canCountLap: this.canCountLap(),
        };
      }
    }

    function runLapRuleSelfTest() {
      const tracker = new LapTracker({ sectorCount: 12, minForwardProgress: 0.86, maxReverseProgress: 0.16 });
      const stepTracker = (sequence) => {
        tracker.resetAt(sequence[0]);
        for (let i = 1; i < sequence.length; i++) {
          const next = wrap01(sequence[i]);
          const delta = wrapProgressDelta(next - tracker.lastProgress);
          if (Math.abs(delta) < 0.35) {
            if (delta > 0.0005) {
              tracker.forwardProgress += delta;
              tracker.markRange(tracker.lastProgress, next);
            } else if (delta < -0.0005) {
              tracker.reverseProgress += -delta;
            }
          }
          tracker.lastProgress = next;
        }
        return tracker.canCountLap();
      };

      return {
        fullLapCounts: stepTracker([0.01, 0.12, 0.21, 0.35, 0.48, 0.62, 0.76, 0.88, 0.97]),
        bounceCheatRejected: !stepTracker([0.01, 0.08, 0.03, 0.0, 0.02]),
        shortcutLapCounts: stepTracker([0.01, 0.14, 0.2, 0.28, 0.35, 0.44, 0.58, 0.71, 0.89, 0.97]),
      };
    }

    const lapTracker = new LapTracker({});
    lapTracker.resetFromPoint(carGroup.position);
    const COUNTDOWN_STEPS = ['1', '2', '3', 'GO!'];
    const COUNTDOWN_STEP_DURATION = 0.82;
    let countdownActive = hasSelectedMap;
    let countdownElapsed = 0;
    let countdownIndex = -1;

    function syncCountdown() {
      if (!countdownActive) {
        countdownEl.classList.remove('visible');
        countdownEl.textContent = '';
        return;
      }

      const nextIndex = Math.floor(countdownElapsed / COUNTDOWN_STEP_DURATION);
      if (nextIndex === countdownIndex) return;
      countdownIndex = nextIndex;

      if (countdownIndex >= COUNTDOWN_STEPS.length) {
        countdownActive = false;
        controlsEnabled = true;
        countdownEl.classList.remove('visible');
        countdownEl.textContent = '';
        return;
      }

      countdownEl.textContent = COUNTDOWN_STEPS[countdownIndex];
      countdownEl.classList.add('visible');
    }

    syncCountdown();

    function updateFinishState(pos) {
      const lapSample = lapTracker.update(pos);
      tempA.copy(pos).sub(finishFrame.point);
      const longitudinal = tempA.dot(finishFrame.tangent);
      const lateral = Math.abs(tempA.dot(finishFrame.right));
      const nearLine = lateral <= lapRoad.halfWidth + 0.5 && Math.abs(longitudinal) <= 2.5;

      if (previousFinishDot !== null && previousFinishDot < 0 && longitudinal >= 0 && nearLine) {
        const now = performance.now() / 1000;
        if (lapActive) {
          if (lapTracker.canCountLap()) {
            const lapTime = now - lapStartTime;
            lapCount++;
            if (lapTime < bestLap) bestLap = lapTime;
            document.getElementById('laps').textContent = lapCount;
            document.getElementById('best').textContent = fmtTime(bestLap);
            showMsg(`Lap ${lapCount} - ${fmtTime(lapTime)}`);
          } else {
            showMsg('Lap Invalid');
          }
        }
        lapStartTime = now;
        lapActive = true;
        lapTracker.resetAt(lapSample ? lapSample.progress : 0);
      }

      previousFinishDot = longitudinal;
    }

    const keys = {};
    window.addEventListener('keydown', (event) => {
      keys[event.code] = true;
      event.preventDefault();
    });
    window.addEventListener('keyup', (event) => {
      keys[event.code] = false;
    });

    let speed = 0;
    let driveTime = 0;
    let offRoadTime = 0;

    const MAX_SPEED = 28;
    const ACCEL = 14;
    const BRAKE_FORCE = 22;
    const FRICTION = 6;
    const TURN_RATE = 1.8;
    const CAR_RADIUS = 1.15;
    const WALL_RESTITUTION = 0.28;
    const TREE_RESTITUTION = 0.08;
    const WALL_SPEED_RETENTION = 0.72;
    const TREE_SPEED_RETENTION = 0.38;
    const IMPACT_DRAG = 3.4;
    const MAX_IMPACT_SPEED = 18;
    const COLLISION_PUSH_EPS = 0.03;
    const COLLISION_SUBSTEP_DISTANCE = 0.7;
    const COLLISION_BINARY_STEPS = 6;
    const OFFROAD_MARGIN = 0.15;
    const OFFROAD_RESPAWN_DELAY = 2.0;
    const RESPAWN_LOOKBACK = 2.5;
    const SNAPSHOT_INTERVAL = 0.12;
    const SNAPSHOT_WINDOW = 8.0;

    const previousCarPos = new THREE.Vector3();
    const candidateCarPos = new THREE.Vector3();
    const driveVelocity = new THREE.Vector3();
    const totalVelocity = new THREE.Vector3();
    const impactVelocity = new THREE.Vector3();
    const collisionProbePos = new THREE.Vector3();
    const collisionSafePos = new THREE.Vector3();
    const collisionFallbackNormal = new THREE.Vector3();
    const carForward = new THREE.Vector3();
    const carUp = new THREE.Vector3();
    const cameraOffset = new THREE.Vector3(0, 4.5, -11);
    const cameraLookOffset = new THREE.Vector3(0, 1.2, 4);
    const desiredCameraPos = new THREE.Vector3();
    const smoothCameraPos = new THREE.Vector3();
    const cameraLookAt = new THREE.Vector3();
    const steeringQuat = new THREE.Quaternion();
    const safeSnapshots = [];
    const collisionState = {
      kind: '',
      normal: new THREE.Vector3(),
      penetration: 0,
      restitution: 0,
      speedRetention: 1,
    };
    const debugState = {
      wallHits: 0,
      treeHits: 0,
      lastCollision: 'none',
      lastRespawnAt: -Infinity,
    };

    const speedEl = document.getElementById('spd');
    const offRoadEl = document.getElementById('offroad');
    const clock = new THREE.Clock();

    function getCarForward(out) {
      return out.copy(LOCAL_FORWARD).applyQuaternion(carGroup.quaternion).normalize();
    }

    function getCarUp(out) {
      return out.copy(LOCAL_UP).applyQuaternion(carGroup.quaternion).normalize();
    }

    function snapCameraToCar() {
      desiredCameraPos.copy(cameraOffset).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      smoothCameraPos.copy(desiredCameraPos);
      cameraLookAt.copy(cameraLookOffset).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      getCarUp(carUp);
      camera.position.copy(smoothCameraPos);
      camera.up.copy(carUp);
      camera.lookAt(cameraLookAt);
    }

    function recordSafeSnapshot() {
      const last = safeSnapshots[safeSnapshots.length - 1];
      if (!last || driveTime - last.time >= SNAPSHOT_INTERVAL) {
        safeSnapshots.push({
          time: driveTime,
          position: carGroup.position.clone(),
          quaternion: carGroup.quaternion.clone(),
        });
      }

      while (safeSnapshots.length > 1 && driveTime - safeSnapshots[0].time > SNAPSHOT_WINDOW) {
        safeSnapshots.shift();
      }
    }

    function getRespawnSnapshot() {
      const targetTime = driveTime - RESPAWN_LOOKBACK;
      for (let i = safeSnapshots.length - 1; i >= 0; i--) {
        if (safeSnapshots[i].time <= targetTime) return safeSnapshots[i];
      }
      return safeSnapshots[0] || { position: START_POS, quaternion: START_QUAT };
    }

    function respawnCar() {
      const snapshot = getRespawnSnapshot();
      carGroup.position.copy(snapshot.position);
      carGroup.quaternion.copy(snapshot.quaternion);
      speed = 0;
      impactVelocity.set(0, 0, 0);
      offRoadTime = 0;
      lapActive = false;
      previousFinishDot = null;
      lapTracker.resetFromPoint(carGroup.position);
      debugState.lastCollision = 'respawn';
      debugState.lastRespawnAt = driveTime;
      snapCameraToCar();
      showMsg('Respawn');
    }

    function closestPointOnSegment(point, a, b, out) {
      tempA.copy(b).sub(a);
      const lenSq = tempA.lengthSq();
      const t = lenSq === 0 ? 0 : clamp01(tempB.copy(point).sub(a).dot(tempA) / lenSq);
      return out.copy(a).addScaledVector(tempA, t);
    }

    function findCollision(point, fallbackNormal, out) {
      let found = false;
      let bestPenetration = 0;

      for (const wall of wallColliders) {
        const closest = closestPointOnSegment(point, wall.a, wall.b, tempC);
        const offset = tempB.copy(point).sub(closest).setY(0);
        const distanceToSegment = offset.length();
        const collisionRadius = CAR_RADIUS + wall.halfThickness;
        const penetration = collisionRadius - distanceToSegment;
        if (penetration <= 0) continue;

        if (distanceToSegment > 1e-5) {
          tempD.copy(offset).multiplyScalar(1 / distanceToSegment);
        } else {
          tempD.copy(wall.normal);
          if (fallbackNormal && fallbackNormal.lengthSq() > 1e-6 && tempD.dot(fallbackNormal) < 0) {
            tempD.negate();
          }
        }

        if (penetration > bestPenetration) {
          found = true;
          bestPenetration = penetration;
          out.kind = 'wall';
          out.penetration = penetration;
          out.restitution = WALL_RESTITUTION;
          out.speedRetention = WALL_SPEED_RETENTION;
          out.normal.copy(tempD);
        }
      }

      for (const tree of treeColliders) {
        const offset = tempA.copy(point).sub(tree.center).setY(0);
        const distanceToTree = offset.length();
        const collisionRadius = CAR_RADIUS + tree.radius;
        const penetration = collisionRadius - distanceToTree;
        if (penetration <= 0) continue;

        if (distanceToTree > 1e-5) {
          tempD.copy(offset).multiplyScalar(1 / distanceToTree);
        } else if (fallbackNormal && fallbackNormal.lengthSq() > 1e-6) {
          tempD.copy(fallbackNormal).normalize();
        } else {
          tempD.set(1, 0, 0);
        }

        if (penetration > bestPenetration) {
          found = true;
          bestPenetration = penetration;
          out.kind = 'tree';
          out.penetration = penetration;
          out.restitution = TREE_RESTITUTION;
          out.speedRetention = TREE_SPEED_RETENTION;
          out.normal.copy(tempD);
        }
      }

      return found ? out : null;
    }

    function applyImpactResponse(velocity, hit) {
      const normalSpeed = velocity.dot(hit.normal);
      if (normalSpeed >= 0) return;

      speed *= hit.speedRetention;
      impactVelocity.addScaledVector(hit.normal, -normalSpeed * (1 + hit.restitution));
      const impactSpeed = impactVelocity.length();
      if (impactSpeed > MAX_IMPACT_SPEED) {
        impactVelocity.multiplyScalar(MAX_IMPACT_SPEED / impactSpeed);
      }
    }

    function advanceCarWithCollisions(dt) {
      const impactDamping = Math.max(0, 1 - IMPACT_DRAG * dt);
      impactVelocity.multiplyScalar(impactDamping);
      if (impactVelocity.lengthSq() < 1e-4) {
        impactVelocity.set(0, 0, 0);
      }

      getCarForward(carForward);
      driveVelocity.copy(carForward).multiplyScalar(speed);
      totalVelocity.copy(driveVelocity).add(impactVelocity);

      const moveDistance = totalVelocity.length() * dt;
      const stepCount = Math.max(1, Math.min(12, Math.ceil(moveDistance / COLLISION_SUBSTEP_DISTANCE)));
      const stepDt = dt / stepCount;

      for (let i = 0; i < stepCount; i++) {
        tempF.copy(carGroup.position);
        getCarForward(carForward);
        driveVelocity.copy(carForward).multiplyScalar(speed);
        totalVelocity.copy(driveVelocity).add(impactVelocity);
        candidateCarPos.copy(tempF).addScaledVector(totalVelocity, stepDt);

        collisionFallbackNormal.copy(totalVelocity).setY(0);
        if (collisionFallbackNormal.lengthSq() > 1e-6) {
          collisionFallbackNormal.normalize().negate();
        } else {
          collisionFallbackNormal.copy(carForward).negate();
        }

        const hit = findCollision(candidateCarPos, collisionFallbackNormal, collisionState);
        if (!hit) {
          carGroup.position.copy(candidateCarPos);
          continue;
        }

        let low = 0;
        let high = 1;

        for (let j = 0; j < COLLISION_BINARY_STEPS; j++) {
          const mid = (low + high) * 0.5;
          collisionProbePos.lerpVectors(tempF, candidateCarPos, mid);
          if (findCollision(collisionProbePos, collisionFallbackNormal, collisionState)) {
            high = mid;
          } else {
            low = mid;
          }
        }

        collisionSafePos.lerpVectors(tempF, candidateCarPos, low);
        collisionProbePos.lerpVectors(tempF, candidateCarPos, high);
        const resolvedHit = findCollision(collisionProbePos, collisionFallbackNormal, collisionState) || hit;
        if (resolvedHit.kind === 'wall') debugState.wallHits += 1;
        if (resolvedHit.kind === 'tree') debugState.treeHits += 1;
        debugState.lastCollision = resolvedHit.kind;

        carGroup.position.copy(collisionSafePos).addScaledVector(resolvedHit.normal, COLLISION_PUSH_EPS);
        applyImpactResponse(totalVelocity, resolvedHit);
        return;
      }
    }

    window.__v10Debug = {
      getState() {
        return {
          activeMapId,
          countdownActive,
          countdownText: countdownEl.textContent,
          shortcutMetrics,
          wallHits: debugState.wallHits,
          treeHits: debugState.treeHits,
          lastCollision: debugState.lastCollision,
          lastRespawnAt: debugState.lastRespawnAt,
          speed,
          impactSpeed: impactVelocity.length(),
          offRoadTime,
          lap: lapTracker.getState(),
          position: {
            x: carGroup.position.x,
            y: carGroup.position.y,
            z: carGroup.position.z,
          },
        };
      },
      runLapRuleSelfTest,
    };

    recordSafeSnapshot();
    snapCameraToCar();
    drawMinimap();

    function update(dt) {
      driveTime += dt;
      if (countdownActive) {
        countdownElapsed += dt;
        syncCountdown();
      }

      const fwd = controlsEnabled && (keys['KeyW'] || keys['ArrowUp']);
      const back = controlsEnabled && (keys['KeyS'] || keys['ArrowDown']);
      const left = controlsEnabled && (keys['KeyA'] || keys['ArrowLeft']);
      const right = controlsEnabled && (keys['KeyD'] || keys['ArrowRight']);

      if (fwd) speed = Math.min(speed + ACCEL * dt, MAX_SPEED);
      else if (back) speed = Math.max(speed - BRAKE_FORCE * dt, -MAX_SPEED * 0.45);
      else {
        const friction = FRICTION * dt;
        speed = Math.abs(speed) < friction ? 0 : speed - Math.sign(speed) * friction;
      }

      const speedFrac = Math.abs(speed) / MAX_SPEED;
      const steerInput = (left ? 1 : 0) + (right ? -1 : 0);
      if (steerInput !== 0) {
        getCarUp(carUp);
        steeringQuat.setFromAxisAngle(carUp, TURN_RATE * dt * speedFrac * Math.sign(speed || 1) * steerInput);
        carGroup.quaternion.premultiply(steeringQuat).normalize();
      }

      previousCarPos.copy(carGroup.position);
      advanceCarWithCollisions(dt);

      const travelDist = carGroup.position.distanceTo(previousCarPos) * Math.sign(speed || 1);
      wheels.forEach((wheel) => { wheel.rotation.x += travelDist / 0.3; });

      const onRoad = roadNetwork.containsPoint(carGroup.position, OFFROAD_MARGIN);
      if (onRoad) {
        offRoadTime = 0;
        recordSafeSnapshot();
      } else {
        offRoadTime += dt;
        if (offRoadTime >= OFFROAD_RESPAWN_DELAY) {
          respawnCar();
          return;
        }
      }

      offRoadEl.textContent = offRoadTime.toFixed(1);

      desiredCameraPos.copy(cameraOffset).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      smoothCameraPos.lerp(desiredCameraPos, 7 * dt);
      camera.position.copy(smoothCameraPos);

      cameraLookAt.copy(cameraLookOffset).applyQuaternion(carGroup.quaternion).add(carGroup.position);
      getCarUp(carUp);
      camera.up.copy(carUp);
      camera.lookAt(cameraLookAt);

      sun.position.set(carGroup.position.x + 50, 100, carGroup.position.z + 30);
      sun.target.position.copy(carGroup.position);
      sun.target.updateMatrixWorld();

      speedEl.textContent = Math.abs(speed * 3.6).toFixed(0);
      updateFinishState(carGroup.position);
      drawMinimap();
    }

    function loop() {
      requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
    }

    loop();
  </script>
</body>
</html>
